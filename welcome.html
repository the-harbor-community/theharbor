<body class="app-shell">
  <div class="app-shell__bg" aria-hidden="true"></div>
  <app-loading-screen></app-loading-screen>
  <app-navigation></app-navigation>

  <main class="app-shell__main" id="main-content" role="main">
    <section class="welcome-hero animate-page-enter">
      <div class="welcome-hero__icon">⚓</div>
      <h1>Welcome to <span class="welcome-hero__accent">The Harbor</span></h1>
      <div class="welcome-version-badge">Harbor V 1.0</div>
      <p class="welcome-hero__tagline" id="tagline">A safe place to share your story, find support, and heal together.</p>
      <p class="welcome-hero__badge">Anonymous · Compassionate · Secure</p>
      <div class="welcome-hero__actions" id="hero-actions">
        <button class="btn btn--hero-primary" type="button" onclick="window.openAuthModal&&window.openAuthModal('signup')">🚀 Join Now — It's Free</button>
        <button class="btn btn--hero-secondary" type="button" onclick="window.openAuthModal&&window.openAuthModal('login')">🔐 I Already Have an Account</button>
      </div>
    </section>
    <div class="welcome-features" id="features"></div>
  </main>

  <app-footer></app-footer>
  <button id="settings-fab" class="settings-fab" hidden aria-label="Settings">⚙️</button>
  <app-sidebar></app-sidebar>
  <app-hamburger></app-hamburger>
  <app-auth-modal></app-auth-modal>
  <app-confirm-modal></app-confirm-modal>
  <app-gold-modal></app-gold-modal>
  <app-edit-story-modal></app-edit-story-modal>
  <app-toast-host></app-toast-host>
  <app-floating-emojis></app-floating-emojis>
  <app-onboarding></app-onboarding>

  <script type="module" src="src/js/shell.js"></script>
  <script type="module" src="src/js/pages/welcome.js"></script>
</body>
