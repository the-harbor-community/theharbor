  <!-- Early theme initialization to block styling flashes before layout paint -->
  <script>
    (function() {
      const theme = localStorage.getItem('harbor_theme') || 'dark';
      document.documentElement.classList.remove('dark-theme', 'deep-sea-theme', 'green-theme', 'black-theme');
      document.documentElement.removeAttribute('data-theme');
      if (theme !== 'light') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.documentElement.classList.add(theme + '-theme');
      }
    })();
  </script>
  
  <title>Feed — The Harbor</title>
  <link rel="stylesheet" href="src/css/theme.css">
  <link rel="stylesheet" href="src/css/base.css">
  <link rel="stylesheet" href="src/css/pages/feed.css">

<body class="app-shell">
  <div id="scroll-progress-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 4px; z-index: 9999; pointer-events: none; background: rgba(0,0,0,0.1); display: none;">
    <div id="scroll-progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, var(--color-primary) 0%, var(--color-primary-light) 100%); transition: width 0.1s ease-out; box-shadow: 0 1px 4px rgba(16, 185, 129, 0.4);"></div>
  </div>
  
  <div class="app-shell__bg" aria-hidden="true"></div>
  <app-loading-screen></app-loading-screen>
  <app-navigation></app-navigation>

  <div id="restricted-banner" style="display:none; background:var(--color-danger); color:#fff; text-align:center; padding:0.75rem; font-weight:700; font-size:0.875rem; z-index:9999; position:sticky; top:4rem; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
    ⚠️ Your account is restricted. You cannot post stories, post comments, or edit your profile.
  </div>

  <main class="app-shell__main" id="main-content" role="main">
    <section class="feed-hero animate-page-enter">
      <h1 id="hero-heading">⚓ Welcome to The Harbor</h1>
      <p id="hero-tagline">A safe place to share, heal, and grow — together.</p>
    </section>

    <div class="feed-search-container" style="display: flex; gap: 0.75rem; width: 100%; box-sizing: border-box; margin-bottom: 1.5rem; position: relative; max-width: 32rem; margin-inline: auto; padding: 0 var(--space-md); flex-wrap: nowrap;">
      <!-- Left search box (Stories) -->
      <div style="flex: 1; position: relative; min-width: 0;">
        <label for="search-stories" class="sr-only">Stories</label>
        <input type="search" id="search-stories" class="input feed-search__input" placeholder="Stories" autocomplete="off" style="width: 100%; border-radius: var(--radius-lg); box-sizing: border-box; padding-left: 2.75rem; font-size: 0.8125rem; color: var(--text-primary); background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2216%22 height=%2216%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23a0aec0%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><circle cx=%2211%22 cy=%2211%22 r=%228%22></circle><line x1=%2221%22 y1=%2221%22 x2=%2216.65%22 y2=%2216.65%22></line></svg>'); background-repeat: no-repeat; background-position: 0.875rem center; background-size: 1rem;">
        <div id="stories-search-dropdown" class="search-results-dropdown" style="display: none; position: absolute; left: 0; right: 0; top: 100%; background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); z-index: 1000; max-height: 300px; overflow-y: auto; margin-top: 0.25rem;"></div>
      </div>
      
      <!-- Right search box (Harbor Members) -->
      <div style="flex: 1; position: relative; min-width: 0;">
        <label for="search-members" class="sr-only">Members</label>
        <input type="search" id="search-members" class="input feed-search__input" placeholder="Members" autocomplete="off" style="width: 100%; border-radius: var(--radius-lg); box-sizing: border-box; padding-left: 2.75rem; font-size: 0.8125rem; color: var(--text-primary); background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2216%22 height=%2216%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23a0aec0%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><circle cx=%2211%22 cy=%2211%22 r=%228%22></circle><line x1=%2221%22 y1=%2221%22 x2=%2216.65%22 y2=%2216.65%22></line></svg>'); background-repeat: no-repeat; background-position: 0.875rem center; background-size: 1rem;">
        <div id="members-search-dropdown" class="search-results-dropdown" style="display: none; position: absolute; left: 0; right: 0; top: 100%; background: var(--color-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); z-index: 1000; max-height: 300px; overflow-y: auto; margin-top: 0.25rem;"></div>
      </div>
    </div>

    <nav class="feed-tabs" id="feed-tabs" role="tablist" aria-label="Story categories"></nav>

    <div id="stories-container" class="feed-stories" aria-live="polite"></div>
    <div id="load-more-wrap" class="feed-load-more" hidden>
      <button id="load-more-btn" class="btn btn--secondary">📥 Load More</button>
    </div>
  </main>

  <app-footer></app-footer>
  <button id="settings-fab" class="settings-fab" hidden aria-label="Settings">⚙️</button>
  <app-sidebar></app-sidebar>
  <app-hamburger></app-hamburger>
  <app-auth-modal></app-auth-modal>
  <app-confirm-modal></app-confirm-modal>
  <app-gold-modal></app-gold-modal>
  <app-edit-story-modal></app-edit-story-modal>
  <app-toast-host></app-toast-host>
  <app-floating-emojis></app-floating-emojis>
  <app-onboarding></app-onboarding>

  <!-- Expanded Story Preview Modal -->
  <div id="story-preview-modal" class="modal-backdrop" hidden role="dialog" aria-modal="true" style="z-index: 99991;">
    <div class="card" style="max-width:38rem; width:100%; position:relative; max-height:85vh; display:flex; flex-direction:column; padding:0; box-shadow: var(--shadow-2xl); border-radius: var(--radius-xl); overflow: hidden; background: var(--color-card); border: 1px solid var(--color-border);">
      <div style="padding: 1.25rem; border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center; background: var(--bg-secondary);">
        <h3 id="preview-modal-category" style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; color: var(--color-primary); margin: 0;">Category</h3>
        <button id="preview-modal-close" style="background:none; border:none; cursor:pointer; font-size: 1.25rem; color: var(--text-muted); padding: 0.25rem; line-height: 1;" aria-label="Close">✕</button>
      </div>
      <div id="preview-modal-body" style="padding: 1.5rem; overflow-y: auto; flex: 1;">
        <h2 id="preview-modal-title" style="font-size: 1.5rem; font-weight: 900; line-height: 1.25; margin-bottom: 1rem; color: var(--text-primary);">Story Title</h2>
        <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--color-border);">
          <div id="preview-modal-avatar" style="font-size: 2rem; width: 3rem; height: 3rem; border-radius: var(--radius-full); display: flex; align-items: center; justify-content: center; background: var(--bg-secondary);">👤</div>
          <div>
            <div id="preview-modal-author" style="font-weight: 700; font-size: 0.875rem; color: var(--text-primary);">Author Name</div>
            <div id="preview-modal-meta" style="font-size: 0.75rem; color: var(--text-muted);">Published meta data</div>
          </div>
        </div>
        <div id="preview-modal-content" style="font-size: 0.9375rem; line-height: 1.6; color: var(--text-primary); white-space: pre-wrap; margin-bottom: 1.5rem;">Story text goes here...</div>
      </div>
      <div style="padding: 1rem 1.25rem; border-top: 1px solid var(--color-border); background: var(--bg-secondary); display: flex; justify-content: flex-end; gap: 0.75rem;">
        <button id="preview-modal-cancel" class="btn btn--ghost" style="font-size: 0.8125rem; padding: 0.5rem 1rem;">Close</button>
        <button id="preview-modal-view-full" class="btn btn--primary" style="font-size: 0.8125rem; padding: 0.5rem 1rem; background: var(--color-primary); color: #fff;">📖 View Full Story</button>
      </div>
    </div>
  </div>

  <div id="bug-report-modal" class="modal-backdrop" hidden role="dialog" aria-modal="true">
    <div class="card" style="max-width:24rem;width:100%;position:relative">
      <button id="bug-close" style="position:absolute;top:1rem;right:1rem;background:none;border:none;cursor:pointer" aria-label="Close">✕</button>
      <h2 style="font-weight:900;margin:0 0 1rem">🐛 Report a Bug</h2>
      <form id="bug-form">
        <label class="label">Priority</label>
        <select id="bug-priority" class="select"><option value="low">🟢 Low</option><option value="medium">🟡 Medium</option><option value="high">🔴 High</option></select>
        <label class="label" style="margin-top:0.75rem">Description</label>
        <textarea id="bug-desc" class="textarea" rows="3" required></textarea>
        <button type="submit" class="btn btn--danger" style="width:100%;margin-top:0.75rem">Submit</button>
      </form>
    </div>
  </div>

  <script type="module" src="src/js/shell.js"></script>
  <script type="module" src="src/js/pages/feed.js"></script>
  

</body>
</html>
